<style>
  :root{
    --bg:#0B1420;
    --surface:#121D2E;
    --surface2:#182741;
    --border:#24344F;
    --text:#E7EDF5;
    --muted:#8CA0BD;
    --gold:#E8A33D;
    --green:#2F8F49;
    --crimson:#D6455B;
  }
  *{box-sizing:border-box;}
  body{
    background:
      radial-gradient(ellipse at top, #16233a 0%, var(--bg) 55%),
      var(--bg);
    color:var(--text);
    font-family:'Zen Kaku Gothic New', sans-serif;
    min-height:100vh;
  }
  .mono{font-family:'JetBrains Mono', monospace;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  .card{
    background:linear-gradient(180deg, var(--surface2), var(--surface));
    border:1px solid var(--border);
    border-radius:14px;
  }
  .btn{
    font-family:'Zen Kaku Gothic New', sans-serif;

    border:1px solid transparent;

  .btn:active{transform:scale(.97);}
  .btn-gold{background:var(--gold);color:#241300;}
  .btn-gold:hover{filter:brightness(1.1);}
  .btn-green{background:var(--green);color:#eafff0;}
  .btn-green:hover{filter:brightness(1.15);}
  .btn-crimson{background:var(--crimson);color:#fff0f3;}
  .btn-crimson:hover{filter:brightness(1.15);}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
  .btn-ghost:hover{background:var(--surface2);}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

  .tab-btn{
    padding:.6rem 1rem;border-radius:10px 10px 0 0;font-weight:700;color:var(--muted);
    border-bottom:3px solid transparent;white-space:nowrap;
  }
  .tab-btn.active{color:var(--gold);border-bottom:3px solid var(--gold);background:var(--surface);}

  input, select{
    background:#0d1626;border:1px solid var(--border);color:var(--text);
    border-radius:8px;padding:.5rem .7rem;width:100%;
  }
  input:focus, select:focus{outline:2px solid var(--gold);}
  label{font-size:.78rem;color:var(--muted);}

  .rarity-5{color:var(--gold);}
  .rarity-4{color:#c9a4ff;}
  .rarity-3{color:#7fd1ff;}
  .rarity-2{color:var(--muted);}

  .stat-bar-track{background:#0d1626;border-radius:5px;overflow:hidden;height:8px;border:1px solid var(--border);}
  .stat-bar-fill{height:100%;background:linear-gradient(90deg, var(--gold), #ffd27a);}

  /* 電光掲示板 */
  .scoreboard{
    background:#050b13;
    border:2px solid var(--border);
    border-radius:16px;
    box-shadow:inset 0 0 40px rgba(232,163,61,.06);
  }
  .score-digit{
    font-family:'JetBrains Mono', monospace;
    font-weight:800;
    font-size:3rem;
    color:#ffd27a;
    text-shadow:0 0 12px rgba(255,210,122,.55);
    letter-spacing:2px;
  }
  .live-dot{
    width:9px;height:9px;border-radius:999px;background:var(--crimson);
    box-shadow:0 0 8px var(--crimson);
    animation:pulse 1.1s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}
  .ticker-line{
    border-left:3px solid var(--gold);
    padding:.35rem .7rem;
    animation:fadeIn .35s ease;
    font-size:.92rem;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--surface2);border:1px solid var(--gold);color:var(--text);
    padding:.7rem 1.2rem;border-radius:10px;z-index:100;box-shadow:0 6px 24px rgba(0,0,0,.4);
    animation:fadeIn .25s ease;
  }
  .hidden{display:none !important;}
  .badge{
    display:inline-block;font-size:.7rem;font-weight:700;padding:.15rem .5rem;border-radius:999px;
  }
</style>

<script>
/* =========================================================
   ARMA CUP — Firebase 連携ロジック
   ========================================================= */

/* ---------- 0. Firebase 初期化 ----------
   ★★★ ここに自分の Firebase プロジェクトの config を入れてください ★★★
   Firebaseコンソール → プロジェクトの設定 → 全般 → マイアプリ → SDK構成
*/
const firebaseConfig = {
  apiKey: "AIzaSyAc3XUg1qPcUohFm0zb2a9WGLTS7R1JF0Y",
  authDomain: "soccer-d2630.firebaseapp.com",
  projectId: "soccer-d2630",
  storageBucket: "soccer-d2630.firebasestorage.app",
  messagingSenderId: "253476847905",
  appId: "1:253476847905:web:327a495bebe5db8f373e60"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const FieldValue = firebase.firestore.FieldValue;

/* ---------- 1. グローバル状態 ---------- */
const State = {
  user: null,        // firebase auth user
  userData: null,    // users/{uid} ドキュメント
  players: [],        // users/{uid}/players
  settings: null,      // system_settings/gacha
  tournaments: [],
  matches: [],
  activeTab: 'login',
  unsub: {}           // onSnapshotのunsubscribe関数格納
};

const DEFAULT_RATES = { star5:5, star4:15, star3:45, star2:25, item:10, itemTrainingRatio:0.6 };
const RARITY_RANGE = { star5:[70,90], star4:[50,69], star3:[30,49], star2:[10,29] };
const RARITY_LABEL = { star5:'★5 レジェンド', star4:'★4 エース', star3:'★3 レギュラー', star2:'★2 育成枠' };
const SKILLS = {
  shoot:  { name:'弾丸シュート', stat:'shoot' },
  pass:   { name:'精密キラーパス', stat:'pass' },
  defense:{ name:'剃刀タックル', stat:'defense' },
  save:   { name:'神の手', stat:'save' }
};
const POS_STAT = { FW:'shoot', MF:'pass', DF:'defense', GK:'save' };
const SURNAMES = ["風間","黒鉄","朝霧","獅子堂","雷神","氷室","炎条","蒼焔","天城","鬼灯","月影","獄門","翠嵐","無双","猛虎","紅蓮","朔夜","白銀","飛竜","八重樫"];
const GIVEN = ["蓮","颯","翔","雅","豪","陣","楓","烈","舞","燐","刃","蒼","雷","獅","凰","嵐","翔真","雫","昴","隼"];

function toast(msg, kind){
  const el = document.createElement('div');
  el.className = 'toast';
  if(kind==='error') el.style.borderColor = 'var(--crimson)';
  el.textContent = msg;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }
function expNeeded(level){ return 100 + level*50; }
function pointsForLevelUp(potential){ return 2 + Math.floor(potential/10); }
function materialsNeeded(awaken){ return awaken+1; }

/* ---------- 2. 認証 ---------- */
/* アカウント名でログインさせるため、内部的には
   「アカウント名@armacup.local」という擬似メールアドレスに変換して
   Firebase Authentication (メール/パスワード認証) を利用する。
   ユーザーには一切メールアドレスを意識させない。 */
function usernameToEmail(username){
  const normalized = (username||'').trim().toLowerCase().replace(/[^a-z0-9_.-]/g,'');
  return normalized ? `${normalized}@armacup.local` : '';
}

function signUp(username, pass){
  const email = usernameToEmail(username);
  if(!email) return Promise.reject(new Error('アカウント名は半角英数字・_-.のみ使用できます'));
  return auth.createUserWithEmailAndPassword(email, pass).then(async cred=>{
    await db.collection('users').doc(cred.user.uid).set({
      username: username || email.split('@')[0],
      tp: 1000,
      items:{ training:0, camp:0 },
      formation:{ FW:null, MF:null, DF:null, GK:null },
      isAdmin:false,
      createdAt: FieldValue.serverTimestamp()
    });
  });
}
function login(username, pass){
  const email = usernameToEmail(username);
  if(!email) return Promise.reject(new Error('アカウント名は半角英数字・_-.のみ使用できます'));
  return auth.signInWithEmailAndPassword(email, pass);
}
function logout(){ return auth.signOut(); }

auth.onAuthStateChanged(async user=>{
  Object.values(State.unsub).forEach(fn=>fn && fn());
  State.unsub = {};
  State.user = user;
  if(user){
    listenUser(user.uid);
    listenPlayers(user.uid);
    listenSettings();
    listenTournaments();
    setActiveTab('mypage');
  } else {
    State.userData = null; State.players = []; State.settings = null;
    State.tournaments = []; State.matches = [];
    setActiveTab('login');
  }
  renderNav(); renderHeader(); renderTab();
});

function listenUser(uid){
  State.unsub.user = db.collection('users').doc(uid).onSnapshot(snap=>{
    State.userData = snap.exists ? { id:snap.id, ...snap.data() } : null;
    renderHeader(); renderNav();
    if(['mypage','gacha','formation','match','admin'].includes(State.activeTab)) renderTab();
  });
}
function listenPlayers(uid){
  State.unsub.players = db.collection('users').doc(uid).collection('players')
    .orderBy('createdAt','desc').onSnapshot(snap=>{
      State.players = snap.docs.map(d=>({ id:d.id, ...d.data() }));
      if(['mypage','formation','admin'].includes(State.activeTab)) renderTab();
    });
}
function listenSettings(){
  State.unsub.settings = db.collection('system_settings').doc('gacha').onSnapshot(snap=>{
    State.settings = snap.exists ? snap.data() : DEFAULT_RATES;
    if(['gacha','admin'].includes(State.activeTab)) renderTab();
  });
}
function listenTournaments(){
  State.unsub.tournaments = db.collection('tournaments').orderBy('createdAt','desc')
    .onSnapshot(snap=>{
      State.tournaments = snap.docs.map(d=>({ id:d.id, ...d.data() }));
      if(['match','admin'].includes(State.activeTab)) renderTab();
    });
  State.unsub.matches = db.collection('matches').orderBy('createdAt','desc')
    .onSnapshot(snap=>{
      State.matches = snap.docs.map(d=>({ id:d.id, ...d.data() }));
      if(['match','admin'].includes(State.activeTab)) renderTab();
    });
}

/* ---------- 3. ガチャ ---------- */
function rollRarity(rates){
  const r = rates || DEFAULT_RATES;
  const total = (r.star5||0)+(r.star4||0)+(r.star3||0)+(r.star2||0)+(r.item||0);
  let roll = Math.random()*total;
  if((roll -= r.star5) < 0) return 'star5';
  if((roll -= r.star4) < 0) return 'star4';
  if((roll -= r.star3) < 0) return 'star3';
  if((roll -= r.star2) < 0) return 'star2';
  return 'item';
}
function makePlayer(rarity){
  const [lo,hi] = RARITY_RANGE[rarity];
  return {
    name: pick(SURNAMES)+pick(GIVEN),
    rarity,
    level:0, exp:0, awaken:0,
    potential: randInt(20,50),
    pendingPoints:0,
    stats:{
      shoot: randInt(lo,hi),
      pass: randInt(lo,hi),
      defense: randInt(lo,hi),
      save: randInt(lo,hi)
    },
    skills:[],
    createdAt: FieldValue.serverTimestamp()
  };
}
async function gachaPull(times){
  const cost = times===10 ? 3000 : 300;
  if(!State.userData || State.userData.tp < cost){ toast('TPが足りません','error'); return; }
  const rates = State.settings || DEFAULT_RATES;
  const results = [];
  for(let i=0;i<times;i++){
    const rarity = rollRarity(rates);
    if(rarity === 'item'){
      const isTraining = Math.random() < (rates.itemTrainingRatio ?? 0.6);
      results.push({ type:'item', item: isTraining?'training':'camp' });
    } else {
      results.push({ type:'player', player: makePlayer(rarity) });
    }
  }
  const uid = State.user.uid;
  const batch = db.batch();
  const userRef = db.collection('users').doc(uid);
  let trainingGain=0, campGain=0;
  results.forEach(r=>{
    if(r.type==='item'){
      if(r.item==='training') trainingGain++; else campGain++;
    } else {
      const ref = userRef.collection('players').doc();
      batch.set(ref, r.player);
    }
  });
  batch.update(userRef, {
    tp: FieldValue.increment(-cost),
    'items.training': FieldValue.increment(trainingGain),
    'items.camp': FieldValue.increment(campGain)
  });
  await batch.commit();
  renderGachaResult(results);
}

/* ---------- 4. 育成（EXP・レベルアップ・ポイント振り分け） ---------- */
async function useItem(playerId, itemType){
  const uid = State.user.uid;
  const owned = State.userData.items?.[itemType] || 0;
  if(owned <= 0){ toast('アイテムがありません','error'); return; }
  const player = State.players.find(p=>p.id===playerId);
  if(!player) return;
  const gainExp = itemType==='training' ? 50 : 200;
  let { level, exp, potential, pendingPoints } = player;
  exp += gainExp;
  let gainedPoints = 0;
  while(exp >= expNeeded(level)){
    exp -= expNeeded(level);
    level += 1;
    gainedPoints += pointsForLevelUp(potential);
  }
  pendingPoints = (pendingPoints||0) + gainedPoints;
  const batch = db.batch();
  const userRef = db.collection('users').doc(uid);
  batch.update(userRef, { [`items.${itemType}`]: FieldValue.increment(-1) });
  batch.update(userRef.collection('players').doc(playerId), { level, exp, pendingPoints });
  await batch.commit();
  if(gainedPoints>0) toast(`${player.name} レベルアップ！ +${gainedPoints}ポイント獲得`);
  else toast(`${player.name} に経験値+${gainExp}`);
}

async function allocatePoint(playerId, statKey){
  const player = State.players.find(p=>p.id===playerId);
  if(!player || (player.pendingPoints||0) <= 0) return;
  const newVal = (player.stats[statKey]||0) + 1;
  const newSkills = new Set(player.skills||[]);
  if(newVal >= 50) newSkills.add(statKey);
  await db.collection('users').doc(State.user.uid).collection('players').doc(playerId).update({
    [`stats.${statKey}`]: newVal,
    pendingPoints: FieldValue.increment(-1),
    skills: Array.from(newSkills)
  });
}

/* ---------- 5. 覚醒 ---------- */
async function awaken(playerId, materialIds){
  const player = State.players.find(p=>p.id===playerId);
  if(!player) return;
  const need = materialsNeeded(player.awaken||0);
  if(materialIds.length !== need){ toast(`素材が${need}体必要です`,'error'); return; }
  const materials = materialIds.map(id=>State.players.find(p=>p.id===id));
  if(materials.some(m=>!m || m.rarity !== player.rarity || m.id===playerId)){
    toast('同じレア度の別選手を選んでください','error'); return;
  }
  const uid = State.user.uid;
  const batch = db.batch();
  const pRef = db.collection('users').doc(uid).collection('players').doc(playerId);
  const newStats = {};
  Object.keys(player.stats).forEach(k=> newStats[k] = player.stats[k] + 10);
  batch.update(pRef, { awaken: FieldValue.increment(1), stats:newStats });
  materialIds.forEach(id=>{
    batch.delete(db.collection('users').doc(uid).collection('players').doc(id));
  });
  await batch.commit();
  toast(`${player.name} が覚醒！ 全ステータス+10`);
}

/* ---------- 6. 編成 ---------- */
async function setFormationSlot(pos, playerId){
  await db.collection('users').doc(State.user.uid).update({ [`formation.${pos}`]: playerId || null });
}

/* ---------- 7. 実況コメント生成 ---------- */
function commentaryFor(pos, name, statKey, isSkill){
  const templates = {
    shoot: isSkill ? [`[FW]${name}の『弾丸シュート』炸裂！`] : [`[FW]${name}がシュートを狙う！`],
    pass:  isSkill ? [`[MF]${name}の『精密キラーパス』が通る！`] : [`[MF]${name}がパスをつなぐ`],
    defense:isSkill ? [`[DF]${name}の『剃刀タックル』でボールを刈り取る！`] : [`[DF]${name}が体を寄せてブロック`],
    save:  isSkill ? [`[GK]${name}が『神の手』でスーパーセーブ！！`] : [`[GK]${name}がキャッチ`]
  };
  return pick(templates[statKey]);
}

function simulateTick(teamA, teamB, scoreA, scoreB){
  // どちらが攻めるか（MFのパス力で重み付け）
  const wA = (teamA.MF?.stats.pass||10) + 20;
  const wB = (teamB.MF?.stats.pass||10) + 20;
  const attackingIsA = Math.random() * (wA+wB) < wA;
  const atk = attackingIsA ? teamA : teamB;
  const def = attackingIsA ? teamB : teamA;
  const logs = [];
  if(atk.MF){
    const mfSkill = (atk.MF.skills||[]).includes('pass');
    logs.push(commentaryFor('MF', atk.MF.name, 'pass', mfSkill));
  }
  let goal = false;
  if(atk.FW){
    const fwSkill = (atk.FW.skills||[]).includes('shoot');
    logs.push(commentaryFor('FW', atk.FW.name, 'shoot', fwSkill));
    const shootPower = atk.FW.stats.shoot - (def.DF?.stats.defense||0)*0.3;
    const savePower = def.GK?.stats.save || 10;
    const goalChance = clamp(0.30 + (shootPower - savePower)/200, 0.05, 0.85);
    if(Math.random() < goalChance){
      goal = true;
      logs.push(`⚽ ゴォォール！！ ${atk.FW.name}が決めた！`);
    } else if(def.GK){
      const gkSkill = (def.GK.skills||[]).includes('save');
      logs.push(commentaryFor('GK', def.GK.name, 'save', gkSkill));
    } else if(def.DF){
      logs.push(commentaryFor('DF', def.DF.name, 'defense', (def.DF.skills||[]).includes('defense')));
    }
  }
  return { logs, scoreA: scoreA + (goal && attackingIsA?1:0), scoreB: scoreB + (goal && !attackingIsA?1:0) };
}

async function loadTeam(uid){
  const userSnap = await db.collection('users').doc(uid).get();
  const form = userSnap.data()?.formation || {};
  const team = {};
  for(const pos of ['FW','MF','DF','GK']){
    if(form[pos]){
      const pSnap = await db.collection('users').doc(uid).collection('players').doc(form[pos]).get();
      team[pos] = pSnap.exists ? { id:pSnap.id, ...pSnap.data() } : null;
    }
  }
  return team;
}

let matchTimer = null;
async function startMatchSimulation(matchId){
  const matchRef = db.collection('matches').doc(matchId);
  const matchSnap = await matchRef.get();
  const m = matchSnap.data();
  const teamA = await loadTeam(m.playerAUid);
  const teamB = await loadTeam(m.playerBUid);
  await matchRef.update({ status:'live', score:{a:0,b:0}, logs:[], startedAt: FieldValue.serverTimestamp() });
  let scoreA=0, scoreB=0, elapsed=0;
  const DURATION = 300; const TICK = 3.5;
  if(matchTimer) clearInterval(matchTimer);
  matchTimer = setInterval(async ()=>{
    elapsed += TICK;
    const { logs, scoreA:na, scoreB:nb } = simulateTick(teamA, teamB, scoreA, scoreB);
    scoreA = na; scoreB = nb;
    await matchRef.update({
      score:{a:scoreA,b:scoreB},
      logs: FieldValue.arrayUnion(...logs.map(t=>`[${Math.floor(elapsed)}s] ${t}`))
    });
    if(elapsed >= DURATION){
      clearInterval(matchTimer);
      await finishMatch(matchId, scoreA, scoreB);
    }
  }, TICK*1000);
}

async function finishMatch(matchId, scoreA, scoreB){
  const matchRef = db.collection('matches').doc(matchId);
  const winner = scoreA===scoreB ? 'draw' : (scoreA>scoreB ? 'A':'B');
  await matchRef.update({ status:'finished', score:{a:scoreA,b:scoreB}, winner });
  await payoutMatch(matchId, winner);
}

async function placeBet(matchId, side, amount){
  amount = Number(amount);
  if(!amount || amount<=0){ toast('賭け金を入力してください','error'); return; }
  if(State.userData.tp < amount){ toast('TPが足りません','error'); return; }
  const uid = State.user.uid;
  const betRef = db.collection('matches').doc(matchId).collection('bets').doc(uid);
  const existing = await betRef.get();
  if(existing.exists){ toast('既にこの試合に賭けています','error'); return; }
  await db.runTransaction(async tx=>{
    tx.update(db.collection('users').doc(uid), { tp: FieldValue.increment(-amount) });
    tx.set(betRef, { uid, side, amount, createdAt: FieldValue.serverTimestamp() });
  });
  toast('賭けを受け付けました');
}

async function payoutMatch(matchId, winner){
  const betsSnap = await db.collection('matches').doc(matchId).collection('bets').get();
  const bets = betsSnap.docs.map(d=>d.data());
  if(winner==='draw'){
    // 引き分けは全額返却
    const batch = db.batch();
    bets.forEach(b=> batch.update(db.collection('users').doc(b.uid), { tp: FieldValue.increment(b.amount) }));
    await batch.commit();
    return;
  }
  const winners = bets.filter(b=>b.side===winner);
  const losers = bets.filter(b=>b.side!==winner);
  const winPool = winners.reduce((s,b)=>s+b.amount,0);
  const losePool = losers.reduce((s,b)=>s+b.amount,0);
  const batch = db.batch();
  winners.forEach(b=>{
    const share = winPool>0 ? (b.amount/winPool)*losePool : 0;
    const payout = b.amount + share; // 元本 + 配当
    batch.update(db.collection('users').doc(b.uid), { tp: FieldValue.increment(Math.round(payout)) });
  });
  await batch.commit();
}

async function grantTP(targetUid, amount){
  amount = Number(amount);
  if(!amount) return;
  if(targetUid === 'ALL'){
    const snap = await db.collection('users').get();
    const batch = db.batch();
    snap.docs.forEach(d=> batch.update(d.ref, { tp: FieldValue.increment(amount) }));
    await batch.commit();
    toast(`全ユーザーにTP ${amount} を配布しました`);
  } else {
    await db.collection('users').doc(targetUid).update({ tp: FieldValue.increment(amount) });
    toast('TPを付与しました');
  }
}

    </div>`).join('');
  document.querySelectorAll('[data-status]').forEach(b=> b.onclick = ()=> setMatchStatus(b.dataset.id, b.dataset.status));
  document.querySelectorAll('[data-start]').forEach(b=> b.onclick = ()=> startMatchSimulation(b.dataset.start));

  const r = State.settings || DEFAULT_RATES;
  document.getElementById('rate-form').innerHTML = ['star5','star4','star3','star2','item'].map(k=>`
    <div><label>${k}</label><input type="number" id="rate-${k}" value="${r[k]}"></div>
  `).join('') + `<div class="col-span-2"><label>アイテムの内、トレーニング札比率(0-1)</label><input type="number" step="0.05" id="rate-ratio" value="${r.itemTrainingRatio ?? 0.6}"></div>`;
  document.getElementById('save-rates-btn').onclick = ()=>{
    updateGachaRates({
      star5:Number(document.getElementById('rate-star5').value),
      star4:Number(document.getElementById('rate-star4').value),
      star3:Number(document.getElementById('rate-star3').value),
      star2:Number(document.getElementById('rate-star2').value),
      item:Number(document.getElementById('rate-item').value),
      itemTrainingRatio:Number(document.getElementById('rate-ratio').value)
    });
  };

  document.getElementById('grant-tp-btn').onclick = ()=>{
    grantTP(tpTargetSel.value, document.getElementById('tp-amount').value);
  };
}

/* ---------- 初期描画 ---------- */
renderNav(); renderHeader(); renderTab();
</script>
</body>
</html>
